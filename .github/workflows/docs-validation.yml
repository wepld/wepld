name: Architecture docs validation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "docs/adr/**"
      - "scripts/validate_architecture_docs.py"
      - ".github/workflows/docs-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "docs/adr/**"
      - "scripts/validate_architecture_docs.py"
      - ".github/workflows/docs-validation.yml"

permissions:
  contents: read

jobs:
  architecture-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate architecture documentation
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PULL_REQUEST_BASE_SHA"
          else
            base="$PUSH_BASE_SHA"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "No exact base commit is available for $EVENT_NAME" >&2
            exit 1
          fi
          git cat-file -e "${base}^{commit}"
          python3 scripts/validate_architecture_docs.py --base "$base"
