name: S0.5A desktop security prototype (EXPERIMENTAL - never merge)

# Evidence-only workflow for TDR-002. Scoped to the experiment paths and
# manual dispatch. Least-privilege token, SHA-pinned actions, locked
# dependency installs, no secrets, no signing, no releases.
#
# Provenance (S05A-PROVENANCE-001): pull-request runs check out the exact
# reviewed PR head (github.event.pull_request.head.sha), NOT the default
# synthetic merge ref, and every job fails unless HEAD == that head.
# Manual runs REQUIRE an explicit reviewed source_ref.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Exact reviewed commit SHA to build (required; no default)"
        required: true
  pull_request:
    paths:
      - "experiments/s0-5a-desktop-security/**"
      - ".github/workflows/s0-5a-desktop-security.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  core:
    name: core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: experiments/s0-5a-desktop-security
    steps:
      - name: Checkout reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}
          persist-credentials: false
      - name: Verify checkout is the reviewed head
        run: |
          EXPECTED="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}"
          if [ -z "$EXPECTED" ]; then echo "::error::no source ref provided"; exit 1; fi
          EXPECTED_FULL="$(git rev-parse "${EXPECTED}^{commit}")"
          ACTUAL="$(git rev-parse HEAD)"
          echo "expected=$EXPECTED_FULL actual=$ACTUAL"
          [ "$EXPECTED_FULL" = "$ACTUAL" ] || { echo "::error::checkout SHA mismatch"; exit 1; }
      - name: Toolchain
        run: rustc --version && cargo --version
      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test (locked)
        run: cargo test --locked
      - name: Release build
        run: cargo build --locked --release
      - name: Bench (evidence)
        run: cargo run --locked --release --bin s05a-bench
        env:
          S05A_BENCH_ITERS: "3000"

  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: experiments/s0-5a-desktop-security/app
    steps:
      - name: Checkout reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}
          persist-credentials: false
      - name: Verify checkout is the reviewed head
        run: |
          EXPECTED="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}"
          if [ -z "$EXPECTED" ]; then echo "::error::no source ref provided"; exit 1; fi
          [ "$(git rev-parse "${EXPECTED}^{commit}")" = "$(git rev-parse HEAD)" ] || { echo "::error::checkout SHA mismatch"; exit 1; }
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Install (locked, no scripts)
        run: npm ci --ignore-scripts
      - name: Strict typecheck
        run: npm run typecheck
      - name: Build static bundle
        run: npm run build
      - name: Build core for the real-core bridge test
        working-directory: experiments/s0-5a-desktop-security
        run: cargo build --locked --release --bin s05a-core
      - name: Bridge response-contract tests (unit + REAL core)
        env:
          S05A_CORE_BIN: ${{ github.workspace }}/experiments/s0-5a-desktop-security/target/release/s05a-core
        run: npm test

  tauri-host:
    name: tauri-host build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}
          persist-credentials: false
      - name: Verify checkout is the reviewed head
        run: |
          EXPECTED="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}"
          if [ -z "$EXPECTED" ]; then echo "::error::no source ref provided"; exit 1; fi
          [ "$(git rev-parse "${EXPECTED}^{commit}")" = "$(git rev-parse HEAD)" ] || { echo "::error::checkout SHA mismatch"; exit 1; }
      - name: Linux WebView + build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Build frontend (required before host codegen)
        working-directory: experiments/s0-5a-desktop-security/app
        run: |
          npm ci --ignore-scripts
          npm run build
      - name: Build the separate core (sidecar)
        working-directory: experiments/s0-5a-desktop-security
        run: cargo build --locked --release
      - name: Build the Tauri host (locked)
        working-directory: experiments/s0-5a-desktop-security/app/tauri-host
        run: cargo build --locked

  package:
    name: package ${{ matrix.label }} (EXPERIMENTAL)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: windows-2022
            label: windows
          - os: macos-14
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}
          persist-credentials: false
      - name: Verify checkout is the reviewed head
        working-directory: experiments/s0-5a-desktop-security
        run: |
          EXPECTED="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}"
          if [ -z "$EXPECTED" ]; then echo "::error::no source ref provided"; exit 1; fi
          [ "$(git rev-parse "${EXPECTED}^{commit}")" = "$(git rev-parse HEAD)" ] || { echo "::error::checkout SHA mismatch"; exit 1; }
      - name: Provenance self-test (packaging must fail on a forged head)
        if: runner.os == 'Linux'
        working-directory: experiments/s0-5a-desktop-security
        run: bash scripts/verify-provenance.sh --selftest
      - name: Linux WebView + build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: experiments/s0-5a-desktop-security/app
        run: |
          npm ci --ignore-scripts
          npm run build
      - name: Build core (release, locked)
        working-directory: experiments/s0-5a-desktop-security
        run: cargo build --locked --release
      - name: Build Tauri host (release, locked)
        working-directory: experiments/s0-5a-desktop-security/app/tauri-host
        run: cargo build --locked --release
      - name: Assemble unpacked artifact (fails closed on provenance mismatch)
        working-directory: experiments/s0-5a-desktop-security
        env:
          S05A_SOURCE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}
          S05A_WORKFLOW_SHA: ${{ github.sha }}
          S05A_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          S05A_WORKFLOW_RUN_ID: ${{ github.run_id }}
          S05A_REPOSITORY: ${{ github.repository }}
        run: bash scripts/assemble-artifact.sh "${{ matrix.label }}" "artifact-out"
      - name: SHA-256 manifest
        working-directory: experiments/s0-5a-desktop-security
        run: bash scripts/make-checksums.sh "artifact-out"
      - name: Verify provenance (fail closed; no upload on mismatch)
        working-directory: experiments/s0-5a-desktop-security
        run: bash scripts/verify-provenance.sh "artifact-out" "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.source_ref }}"
      - name: Upload artifact (short retention, unsigned, never merge)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: EXPERIMENTAL-NEVER-MERGE-wepld-s05a-${{ matrix.label }}
          path: experiments/s0-5a-desktop-security/artifact-out
          retention-days: 1
          if-no-files-found: error
