name: S0.5A desktop security prototype (EXPERIMENTAL — never merge)

# Evidence-only workflow for TDR-002. Scoped to the experiment paths and
# manual dispatch. Least-privilege token, SHA-pinned actions, locked
# dependency installs, no secrets, no signing, no releases.

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "experiments/s0-5a-desktop-security/**"
      - ".github/workflows/s0-5a-desktop-security.yml"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # PRIMARY EVIDENCE: the zero-dependency core + protocol + security
  # tests + bench, built and run on all three target OSes.
  core:
    name: core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: experiments/s0-5a-desktop-security
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustc --version && cargo --version
      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test (locked)
        run: cargo test --locked
      - name: Release build
        run: cargo build --locked --release
      - name: Bench (evidence)
        run: cargo run --locked --release --bin s05a-bench
        env:
          S05A_BENCH_ITERS: "3000"

  # SECONDARY EVIDENCE: the untrusted frontend typechecks strictly and
  # bundles to a static artifact (no remote origins).
  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: experiments/s0-5a-desktop-security/app
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Install (locked, no scripts)
        run: npm ci --ignore-scripts
      - name: Strict typecheck
        run: npm run typecheck
      - name: Build static bundle
        run: npm run build

  # BUILD-ONLY ATTEMPT: the Tauri host is a proc-macro/build-script-heavy
  # crate that cannot be built under the founder host's Application
  # Control policy. This job attempts a real cross-platform compile so
  # the shell has honest build evidence. Runtime/WebView/accessibility
  # are NOT exercised here (headless) and remain recorded gaps.
  tauri-host:
    name: tauri-host build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Linux WebView + build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Build frontend (required before host codegen)
        working-directory: experiments/s0-5a-desktop-security/app
        run: |
          npm ci --ignore-scripts
          npm run build
      - name: Build the separate core (sidecar)
        working-directory: experiments/s0-5a-desktop-security
        run: cargo build --locked --release
      - name: Build the Tauri host (locked)
        working-directory: experiments/s0-5a-desktop-security/app/tauri-host
        run: cargo build --locked

  # ARTIFACT PACKAGING (evidence support): assemble a runnable UNPACKED
  # (no installer), UNSIGNED, founder-testable artifact per OS with a
  # SHA-256 manifest and BUILD_INFO. Short retention (1 day), no release,
  # no tag, no secrets, no signing. Downloadable only via this private
  # repo's workflow. Not safe for distribution.
  package:
    name: package ${{ matrix.label }} (EXPERIMENTAL)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: windows-2022
            label: windows
          - os: macos-14
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Record source commit
        id: src
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Linux WebView + build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - name: Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: experiments/s0-5a-desktop-security/app
        run: |
          npm ci --ignore-scripts
          npm run build
      - name: Build core (release, locked)
        working-directory: experiments/s0-5a-desktop-security
        run: cargo build --locked --release
      - name: Build Tauri host (release, locked)
        working-directory: experiments/s0-5a-desktop-security/app/tauri-host
        run: cargo build --locked --release
      - name: Assemble unpacked artifact
        working-directory: experiments/s0-5a-desktop-security
        run: bash scripts/assemble-artifact.sh "${{ matrix.label }}" "artifact-out"
      - name: SHA-256 manifest
        working-directory: experiments/s0-5a-desktop-security
        run: bash scripts/make-checksums.sh "artifact-out"
      - name: Upload artifact (short retention, unsigned, never merge)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: EXPERIMENTAL-NEVER-MERGE-wepld-s05a-${{ matrix.label }}
          path: experiments/s0-5a-desktop-security/artifact-out
          retention-days: 1
          if-no-files-found: error
