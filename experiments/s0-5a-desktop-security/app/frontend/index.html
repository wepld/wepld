<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content Security Policy. No remote origins of any kind:
      no remote scripts, styles, fonts, images, or connections. The
      authoritative CSP is also set in tauri.conf.json (app.security.csp);
      this meta tag documents intent for the static bundle.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ipc: http://ipc.localhost; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'"
    />
    <title>S0.5A Desktop Security Prototype — EXPERIMENTAL</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
